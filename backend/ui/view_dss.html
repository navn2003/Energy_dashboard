<!DOCTYPE html>
<html lang="en">
<head>
<script src="auth.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>View DSS Mapping - RE Forecast Engine</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--font-sans,system-ui,-apple-system,sans-serif);}
  .app{display:flex;min-height:100vh;background:#0d0f14;}
  .sidebar{width:172px;background:#111318;border-right:0.5px solid #2a2d36;padding:14px 0;flex-shrink:0;}
  .slogo{display:flex;align-items:center;gap:8px;padding:0 12px 14px;border-bottom:0.5px solid #2a2d36;}
  .slogo-icon{width:26px;height:26px;background:#0ea5e9;border-radius:5px;display:flex;align-items:center;justify-content:center;}
  .slogo-t{font-size:11px;font-weight:600;color:#e2e8f0;line-height:1.2;}
  .slogo-s{font-size:9px;color:#6b7280;}
  .nav-item{display:flex;align-items:center;gap:8px;padding:8px 12px;font-size:12px;color:#6b7280;cursor:pointer;}
  .nav-item:hover{color:#cbd5e1;background:#1a1d25;}
  .nav-item.active{color:#38bdf8;background:#1a2535;border-right:2px solid #38bdf8;}
  .nav-item i{font-size:14px;}
  .submenu{display:none;background:#0d0f14;padding:4px 0;border-top:0.5px solid #2a2d36;border-bottom:0.5px solid #2a2d36;}
  .submenu.open{display:block;}
  .subitem{padding:6px 12px 6px 30px;font-size:11px;color:#6b7280;cursor:pointer;display:flex;align-items:center;gap:6px;}
  .subitem:hover{color:#cbd5e1;background:#1a1d25;}

  .main{flex:1;padding:22px;overflow:auto;}
  .head{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:16px;}
  .ptitle{font-size:20px;font-weight:600;color:#e2e8f0;}
  .psub{font-size:12px;color:#94a3b8;margin-top:3px;}
  .tools{display:flex;gap:10px;align-items:center;}
  .inp{background:#111318;border:1px solid #2a2d36;color:#e2e8f0;padding:8px 11px;border-radius:6px;font-size:12px;outline:none;}
  .inp:focus{border-color:#38bdf8;}
  .btn{background:#0ea5e9;color:#fff;border:none;padding:8px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
  .btn:hover{background:#0284c7;}
  .btn-ghost{background:transparent;color:#94a3b8;border:1px solid #2a2d36;}
  .btn-ghost:hover{color:#38bdf8;border-color:#38bdf8;}

  .scroll{overflow:auto;border:1px solid #2a2d36;border-radius:10px;background:#111318;max-height:calc(100vh - 130px);}
  table{border-collapse:collapse;width:100%;font-size:11px;}
  th,td{border-bottom:1px solid #1a1d25;padding:8px 10px;text-align:left;white-space:nowrap;}
  thead th{background:#161a22;color:#94a3b8;text-transform:uppercase;letter-spacing:.04em;font-size:9px;position:sticky;top:0;z-index:2;}
  td{color:#cbd5e1;}
  tr:hover td{background:#13161e;}
  .cell-input{width:100%;min-width:80px;background:#0d0f14;border:1px solid #38bdf8;color:#e2e8f0;font-size:11px;padding:4px 6px;border-radius:4px;outline:none;}
  .act{display:flex;gap:6px;}
  .ibtn{border:none;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;padding:5px 9px;display:inline-flex;align-items:center;gap:4px;}
  .ibtn-edit{background:#1a2535;color:#38bdf8;}
  .ibtn-edit:hover{background:#22344a;}
  .ibtn-save{background:rgba(16,185,129,.15);color:#10b981;}
  .ibtn-save:hover{background:rgba(16,185,129,.25);}
  .ibtn-cancel{background:transparent;color:#94a3b8;border:1px solid #2a2d36;}
  .ibtn-cancel:hover{color:#ef4444;border-color:#ef4444;}
  .badge{font-size:10px;font-weight:600;padding:1px 7px;border-radius:99px;background:#1a2535;color:#38bdf8;}
  #toast{position:fixed;bottom:20px;right:20px;padding:11px 16px;border-radius:8px;font-size:13px;display:none;z-index:50;}
  .ok{background:rgba(16,185,129,.15);color:#10b981;border:0.5px solid #059669;}
  .bad{background:rgba(239,68,68,.15);color:#ef4444;border:0.5px solid #b91c1c;}
  .empty{color:#6b7280;font-size:13px;padding:40px;text-align:center;}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="slogo">
      <div class="slogo-icon"><i class="ti ti-bolt" style="color:#fff;font-size:13px"></i></div>
      <div><div class="slogo-t">RE Forecast</div><div class="slogo-s">Performance Engine</div></div>
    </div>
    <div style="margin-top:10px;">
      <div class="nav-item" onclick="window.location.href='dashboard.html'"><i class="ti ti-layout-dashboard"></i> Dashboard</div>
      <div class="nav-item" onclick="window.location.href='nrmse_live.html'"><i class="ti ti-table"></i> NRMSE Matrix</div>
      <div class="nav-item" onclick="window.location.href='generation.html'"><i class="ti ti-chart-line"></i> Generation</div>
      <div class="nav-item" onclick="window.location.href='settlement.html'"><i class="ti ti-receipt-2"></i> Settlement</div>
      <div class="nav-item " onclick="window.location.href='registration.html'"><i class="ti ti-database"></i> Registration</div>
                  <div class="nav-item active" onclick="window.location.href='view_dss.html'"><i class="ti ti-table"></i> View DSS</div>

      <div class="nav-item" id="reports-toggle" onclick="toggleReports(event)">
        <i class="ti ti-file-analytics"></i> Reports <i class="ti ti-chevron-down" style="margin-left:auto;font-size:12px;"></i>
      </div>
      <div class="submenu" id="reports-sub">
        <div class="subitem" onclick="window.location.href='scada_missing.html'"><i class="ti ti-layout-dashboard"></i> SCADA Missing Data</div>
        <div class="subitem" onclick="window.location.href='reports.html'"><i class="ti ti-table-options"></i> SCADA</div>
        <div class="subitem" onclick="window.location.href='nrmse_monitor.html'"><i class="ti ti-chart-pie"></i> NRMSE Monitor</div>
        <div class="subitem" onclick="window.location.href='daily_data_delivery.html'"><i class="ti ti-mail-check"></i> Daily Data Delivery</div>
      </div>
      <div class="nav-item" onclick="window.location.href='forecast.html'"><i class="ti ti-cpu"></i> Run Forecast</div>
      <div class="nav-item" onclick="logout()"><i class="ti ti-logout"></i> Logout</div>
    </div>
  </div>

  <div class="main">
    <div class="head">
      <div>
        <div class="ptitle">DSS Mapping Table</div>
        <div class="psub">All rows from <b>pss_dss_uss_mapping</b>. Click <b>Edit</b> on a row to change values, then Save. <span id="count" style="color:#6b7280;"></span></div>
      </div>
      <div class="tools">
        <input class="inp" id="search" placeholder="Filter (PSS / DSS / district…)" oninput="renderRows()">
        <button class="btn-ghost btn" onclick="window.location.href='registration.html'"><i class="ti ti-plus"></i> New</button>
        <button class="btn" onclick="loadData()"><i class="ti ti-refresh"></i> Reload</button>
      </div>
    </div>

    <div class="scroll">
      <table>
        <thead>
          <tr id="thead-row"></tr>
        </thead>
        <tbody id="tbody"><tr><td class="empty">Loading…</td></tr></tbody>
      </table>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
const API_BASE = "http://127.0.0.1:8000";   // match app; "" on Replit/EC2
function toggleReports(e){ if(e) e.stopPropagation(); var s=document.getElementById('reports-sub'); if(s) s.classList.toggle('open'); }

// Columns: key + label + editable + type. (id and total are read-only.)
const COLS = [
  {k:'id',                label:'ID',        edit:false},
  {k:'report_date',       label:'Report Date', edit:true, type:'date'},
  {k:'sr_no',             label:'Sr',        edit:true, type:'number'},
  {k:'voltage_level_kv',  label:'kV',        edit:true, type:'number'},
  {k:'pss_name',          label:'PSS Name',  edit:true, type:'text'},
  {k:'district',          label:'District',  edit:true, type:'text'},
  {k:'zone',              label:'Zone',      edit:true, type:'text'},
  {k:'wind_capacity_mw',  label:'Wind',      edit:true, type:'number'},
  {k:'solar_capacity_mw', label:'Solar',     edit:true, type:'number'},
  {k:'total_capacity_mw', label:'Total',     edit:false},
  {k:'uss_id',            label:'USS ID',    edit:true, type:'text'},
  {k:'dss_id',            label:'DSS ID',    edit:true, type:'text'},
  {k:'poi_id',            label:'POI ID',    edit:true, type:'text'},
  {k:'energy_type',       label:'Energy',    edit:true, type:'text'},
  {k:'mapping_type',      label:'Mapping',   edit:true, type:'text'},
  {k:'billing_group',     label:'Billing',   edit:true, type:'text'},
  {k:'other_names',       label:'Other Names', edit:true, type:'text'},
  {k:'merged_with_pss',   label:'Merged With', edit:true, type:'text'},
];

let DATA = [];   // all rows
let editingId = null;

const TOKEN = () => "&token=" + (sessionStorage.getItem('auth_token') || localStorage.getItem('token') || '');
function token(){ return sessionStorage.getItem('auth_token') || localStorage.getItem('token') || ''; }

function toast(msg, ok=true){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=ok?'ok':'bad'; t.style.display='block';
  setTimeout(()=>t.style.display='none', 2600);
}

// header
document.getElementById('thead-row').innerHTML =
  COLS.map(c=>`<th>${c.label}</th>`).join('') + '<th>Action</th>';

async function loadData(){
  document.getElementById('tbody').innerHTML = '<tr><td class="empty">Loading…</td></tr>';
  try{
    const res = await fetch(`${API_BASE}/api/mapping/all?token=${encodeURIComponent(token())}`);
    const data = await res.json();
    if(data.error){ document.getElementById('tbody').innerHTML=`<tr><td class="empty">${data.error}</td></tr>`; return; }
    DATA = data.rows || [];
    document.getElementById('count').textContent = `· ${DATA.length} rows`;
    renderRows();
  }catch(e){
    document.getElementById('tbody').innerHTML = '<tr><td class="empty">Network error. Is the API running on 8000?</td></tr>';
  }
}

function cellVal(v){ return (v===null||v===undefined) ? '' : v; }

function renderRows(){
  const q = (document.getElementById('search').value||'').toLowerCase();
  const rows = DATA.filter(r=>{
    if(!q) return true;
    return [r.pss_name,r.dss_id,r.uss_id,r.district,r.zone,r.poi_id]
      .some(x => (x||'').toString().toLowerCase().includes(q));
  });
  if(!rows.length){ document.getElementById('tbody').innerHTML='<tr><td class="empty">No rows.</td></tr>'; return; }

  document.getElementById('tbody').innerHTML = rows.map(r=>{
    const editing = (r.id === editingId);
    const cells = COLS.map(c=>{
      const val = cellVal(r[c.k]);
      if(editing && c.edit){
        return `<td><input class="cell-input" data-k="${c.k}" type="${c.type==='number'?'number':(c.type==='date'?'date':'text')}" ${c.type==='number'?'step="any"':''} value="${val}"></td>`;
      }
      if(c.k==='mapping_type' && val) return `<td><span class="badge">${val}</span></td>`;
      return `<td>${val}</td>`;
    }).join('');
    const action = editing
      ? `<td class="act">
           <button class="ibtn ibtn-save" onclick="saveRow(${r.id})"><i class="ti ti-check"></i> Save</button>
           <button class="ibtn ibtn-cancel" onclick="cancelEdit()"><i class="ti ti-x"></i></button>
         </td>`
      : `<td class="act"><button class="ibtn ibtn-edit" onclick="startEdit(${r.id})"><i class="ti ti-edit"></i> Edit</button></td>`;
    return `<tr data-id="${r.id}">${cells}${action}</tr>`;
  }).join('');
}

function startEdit(id){ editingId = id; renderRows(); }
function cancelEdit(){ editingId = null; renderRows(); }

async function saveRow(id){
  const tr = document.querySelector(`tr[data-id="${id}"]`);
  if(!tr) return;
  const payload = {};
  tr.querySelectorAll('.cell-input').forEach(inp=>{
    const k = inp.dataset.k;
    let v = inp.value;
    if(v === '') { payload[k] = null; return; }
    if(inp.type === 'number') v = parseFloat(v);
    payload[k] = v;
  });
  try{
    const res = await fetch(`${API_BASE}/api/mapping/update/${id}?token=${encodeURIComponent(token())}`,{
      method:'PUT',
      headers:{'Content-Type':'application/json','Authorization': token()?`Bearer ${token()}`:''},
      body: JSON.stringify(payload)
    });
    const result = await res.json();
    if(res.ok){
      // update local copy + recompute total
      const row = DATA.find(r=>r.id===id);
      Object.assign(row, payload);
      if(('wind_capacity_mw' in payload)||('solar_capacity_mw' in payload)){
        row.total_capacity_mw = (parseFloat(row.wind_capacity_mw)||0)+(parseFloat(row.solar_capacity_mw)||0);
      }
      editingId = null; renderRows();
      toast(`Row ${id} updated.`, true);
    } else {
      toast(result.error || 'Update failed.', false);
    }
  }catch(e){
    toast('Network error while saving.', false);
  }
}

loadData();
</script>
</body>
</html>
