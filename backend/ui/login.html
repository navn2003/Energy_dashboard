<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in · RE Forecast</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#0d0f14;color:#e2e8f0;font-family:system-ui,-apple-system,sans-serif;
       min-height:100vh;display:flex;align-items:center;justify-content:center;}
  .card{width:340px;background:#111318;border:0.5px solid #2a2d36;border-radius:12px;
        padding:30px 28px;box-shadow:0 12px 40px rgba(0,0,0,.5);}
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:22px;}
  .brand-icon{width:34px;height:34px;background:#0ea5e9;border-radius:7px;display:flex;
              align-items:center;justify-content:center;}
  .brand-icon i{color:#fff;font-size:18px;}
  .brand-t{font-size:14px;font-weight:600;}
  .brand-s{font-size:10px;color:#6b7280;}
  h1{font-size:17px;font-weight:600;margin-bottom:4px;}
  .sub{font-size:12px;color:#94a3b8;margin-bottom:22px;}
  label{display:block;font-size:10px;color:#94a3b8;text-transform:uppercase;
        letter-spacing:.05em;margin:14px 0 6px;}
  .inp{width:100%;background:#0d0f14;border:1px solid #2a2d36;color:#e2e8f0;
       padding:10px 12px;border-radius:6px;font-size:13px;outline:none;}
  .inp:focus{border-color:#38bdf8;}
  .btn{width:100%;margin-top:22px;background:#38bdf8;color:#06141f;border:none;
       padding:11px;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;
       display:flex;align-items:center;justify-content:center;gap:8px;}
  .btn:hover{background:#0ea5e9;}
  .btn:disabled{background:#1e293b;color:#64748b;cursor:not-allowed;}
  .err{display:none;margin-top:14px;font-size:12px;color:#fca5a5;
       background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);
       padding:9px 12px;border-radius:6px;}
</style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-icon"><i class="ti ti-bolt"></i></div>
      <div><div class="brand-t">RE Forecast</div><div class="brand-s">Performance Engine</div></div>
    </div>
    <h1>Sign in</h1>
    <div class="sub">Enter your credentials to access the dashboard.</div>

    <label>Username</label>
    <input class="inp" id="u" type="text" autocomplete="username" autofocus>

    <label>Password</label>
    <input class="inp" id="p" type="password" autocomplete="current-password">

    <button class="btn" id="go"><i class="ti ti-login-2"></i> Sign in</button>
    <div class="err" id="err"></div>
  </div>

<script>
  // Same-origin by default (FastAPI serves both UI and API on Replit/EC2).
  // If you serve the UI separately from the API, set this to the API URL.
  const API_BASE = "http://localhost:8000";

  const u = document.getElementById('u');
  const p = document.getElementById('p');
  const go = document.getElementById('go');
  const err = document.getElementById('err');

  // If already signed in, skip the form.
  if (sessionStorage.getItem('auth_token')) location.replace('nrmse_live.html');

  async function login(){
    err.style.display = 'none';
    go.disabled = true;
    try{
      const res = await fetch(`${API_BASE}/api/login`, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ username: u.value, password: p.value })
      });
      const data = await res.json();
      if(res.ok && data.token){
        sessionStorage.setItem('auth_token', data.token);
        location.replace('nrmse_live.html');   // landing page after login
      }else{
        err.textContent = data.error || 'Sign in failed.';
        err.style.display = 'block';
      }
    }catch(e){
      err.textContent = 'Could not reach the server.';
      err.style.display = 'block';
    }finally{
      go.disabled = false;
    }
  }

  go.addEventListener('click', login);
  p.addEventListener('keydown', e=>{ if(e.key==='Enter') login(); });
  u.addEventListener('keydown', e=>{ if(e.key==='Enter') p.focus(); });
</script>
</body>
</html>
