<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculated-DC Sheet</title>
    <style>
        /* Basic styling to make the table look clean and readable */
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            color: #333;
        }
        .table-container {
            overflow-x: auto;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            min-width: 800px;
            font-size: 14px;
        }
        th, td {
            border: 1px solid #d1d5db;
            padding: 10px;
            text-align: right; /* Numbers aligned to the right */
        }
        th.text-left, td.text-left {
            text-align: left;
        }
        
        /* Column and Header Colors */
        .bg-gray { background-color: #f3f4f6; }
        .bg-blue { background-color: #eff6ff; color: #1d4ed8; font-weight: bold; }
        .bg-orange { background-color: #fff7ed; color: #c2410c; font-weight: bold; }
        .bg-green { background-color: #f0fdf4; color: #15803d; font-weight: bold; }
        
        tbody tr:hover {
            background-color: #f9fafb;
        }
    </style>
</head>
<body>

    <h2>Calculated-DC (Dynamic UI)</h2>
    
    <div class="table-container">
        <table id="dcTable">
            <thead>
                </thead>
            <tbody>
                </tbody>
        </table>
    </div>

    <script>
        // 1. Metadata extracted from your CSVs
        const columnMetadata = [
            { id: 'cogen', name: 'COGEN', type: 'COGEN', pool: 'INTERNAL', variableCost: 0 },
            { id: 'gadarwara', name: 'GADARWARA-I', type: 'Thermal', pool: 'ISGS', variableCost: 0 },
            { id: 'khargone', name: 'KHARGONE-I', type: 'Thermal', pool: 'ISGS', variableCost: 0 },
            { id: 'sipat1', name: 'SIPAT I', type: 'Thermal', pool: 'ISGS', variableCost: 1.38 },
            { id: 'sipat2', name: 'SIPAT II', type: 'Thermal', pool: 'ISGS', variableCost: 1.38 },
            { id: 'solapur', name: 'SOLAPUR', type: 'Thermal', pool: 'ISGS', variableCost: 1.40 },
            { id: 'sharavathy', name: 'SHARAVATHY', type: 'Hydel', pool: 'INTERNAL', variableCost: 0.77 },
            { id: 'minihydro', name: 'MINIHYDRO', type: 'Hydel', pool: 'INTERNAL', variableCost: 3.19 },
        ];

        // 2. Mock block rows
        const blockData = [
            { block: 1, cogen: 100, gadarwara: 50, khargone: 50, sipat1: 120, sipat2: 120, solapur: 80, sharavathy: 200, minihydro: 40 },
            { block: 2, cogen: 100, gadarwara: 55, khargone: 55, sipat1: 125, sipat2: 125, solapur: 85, sharavathy: 210, minihydro: 40 },
            { block: 3, cogen: 95, gadarwara: 60, khargone: 60, sipat1: 130, sipat2: 130, solapur: 90, sharavathy: 220, minihydro: 35 },
        ];

        // 3. Generate the Table Headers dynamically
        const thead = document.querySelector('#dcTable thead');
        
        let typeRow = `<tr><th class="text-left bg-gray">Plant Type</th><th class="bg-gray"></th><th class="bg-gray"></th><th class="bg-gray"></th>`;
        let poolRow = `<tr><th class="text-left bg-gray">Pool</th><th class="bg-gray"></th><th class="bg-gray"></th><th class="bg-gray"></th>`;
        let vcRow = `<tr><th class="text-left bg-gray">Variable Cost</th><th class="bg-gray"></th><th class="bg-gray"></th><th class="bg-gray"></th>`;
        let nameRow = `<tr class="bg-gray"><th class="text-left">Block</th><th class="bg-blue">Total DC</th><th class="bg-orange">Total ISGS</th><th class="bg-green">Total Internal</th>`;

        // Loop through metadata to create columns
        columnMetadata.forEach(col => {
            typeRow += `<th>${col.type}</th>`;
            poolRow += `<th>${col.pool}</th>`;
            vcRow += `<th>${col.variableCost}</th>`;
            nameRow += `<th>${col.name}</th>`;
        });

        // Close and attach the header rows
        thead.innerHTML = typeRow + '</tr>' + poolRow + '</tr>' + vcRow + '</tr>' + nameRow + '</tr>';

        // 4. Generate the Table Body and calculate totals dynamically
        const tbody = document.querySelector('#dcTable tbody');
        let tbodyHtml = '';

        blockData.forEach(row => {
            let isgsTotal = 0;
            let internalTotal = 0;

            // Calculate exact sums by checking the pool type
            columnMetadata.forEach(col => {
                const val = row[col.id] || 0;
                if (col.pool === 'ISGS') {
                    isgsTotal += val;
                } else if (col.pool === 'INTERNAL') {
                    internalTotal += val;
                }
            });

            const grandTotal = isgsTotal + internalTotal;

            // Build the HTML for the current row
            let rowHtml = `<tr>
                <td class="text-left"><strong>${row.block}</strong></td>
                <td class="bg-blue">${grandTotal.toFixed(2)}</td>
                <td class="bg-orange">${isgsTotal.toFixed(2)}</td>
                <td class="bg-green">${internalTotal.toFixed(2)}</td>`;

            // Add the individual unit values to the row
            columnMetadata.forEach(col => {
                const unitValue = row[col.id] || 0;
                rowHtml += `<td>${unitValue.toFixed(2)}</td>`;
            });

            rowHtml += `</tr>`;
            tbodyHtml += rowHtml;
        });

        // Attach the rows to the table
        tbody.innerHTML = tbodyHtml;
    </script>

</body>
</html>
